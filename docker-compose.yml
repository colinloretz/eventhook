version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eventhook
      POSTGRES_USER: eventhook
      POSTGRES_PASSWORD: eventhook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  eventhook:
    build: .
    ports:
      - "7676:7676"
    environment:
      EVENTHOOK_DATABASE_URL: postgres://eventhook:eventhook@postgres:5432/eventhook?sslmode=disable
      EVENTHOOK_REDIS_URL: redis://redis:6379
      EVENTHOOK_API_KEY: dev-api-key
      EVENTHOOK_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
